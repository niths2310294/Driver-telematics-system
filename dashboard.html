
<!DOCTYPE html>
<html>
<head>
  <title>Driver Telematics</title>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
</head>

<body style="font-family: Arial; text-align:center;">

<h1>🚗 Driver Telematics Dashboard</h1>

<h3>Live Data</h3>
<p id="time"></p>
<p id="speed"></p>
<p id="coords"></p>

<div id="map" style="height:300px;"></div>

<h3>📜 Trip History</h3>
<div id="tripLogs"></div>

<script>
// =========================
// MAP SETUP
// =========================
var map = L.map('map').setView([13.0827, 80.2707], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

var marker = L.marker([13.0827, 80.2707]).addTo(map);

// =========================
// LIVE DATA
// =========================
function fetchData() {
  fetch('/data')
    .then(r => r.json())
    .then(d => {

      let lat = parseFloat(d.lat);
      let lon = parseFloat(d.lon);
      let spd = parseFloat(d.speed);

      document.getElementById("time").innerText =
        "Time: " + d.timestamp;

      document.getElementById("speed").innerText =
        "Speed: " + spd.toFixed(1) + " km/h";

      document.getElementById("coords").innerText =
        "Lat: " + lat.toFixed(4) + " Lon: " + lon.toFixed(4);

      if (!isNaN(lat) && !isNaN(lon)) {
        marker.setLatLng([lat, lon]);
        map.panTo([lat, lon]);
      }
    });
}

// =========================
// TRIP LOGS
// =========================
async function fetchTripLogs() {
  const res = await fetch('/logs');
  const logs = await res.json();

  let html = "";

  logs.forEach(log => {
    html += `
      <div style="border:1px solid #ccc; margin:10px; padding:10px;">
        <b>Start:</b> ${log.start}<br>
        <b>End:</b> ${log.end}<br>
        <b>Duration:</b> ${log.duration.toFixed(2)} min<br>
        <b>Avg Speed:</b> ${log.avg_speed.toFixed(2)} km/h
      </div>
    `;
  });

  document.getElementById("tripLogs").innerHTML = html;
}

// =========================
// INTERVALS
// =========================
setInterval(fetchData, 2000);
setInterval(fetchTripLogs, 5000);

</script>

</body>
</html>
